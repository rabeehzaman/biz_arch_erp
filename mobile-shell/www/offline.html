<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>BizArch Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        color: #0f172a;
        padding: env(safe-area-inset-top, 0px) 24px env(safe-area-inset-bottom, 0px);
        padding-top: var(--safe-area-inset-top, env(safe-area-inset-top, 0px));
      }
      main {
        max-width: 320px;
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        border-radius: 16px;
        background: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg { width: 32px; height: 32px; color: #94a3b8; }
      h1 {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 8px;
      }
      p {
        font-size: 15px;
        line-height: 1.5;
        color: #64748b;
        margin-bottom: 24px;
      }
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        padding: 0 24px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        background: #fff;
        color: #0f172a;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 1px 3px rgba(15,23,42,0.06);
        transition: background 0.15s;
      }
      button:active { background: #f1f5f9; }
    </style>
  </head>
  <body>
    <main>
      <div class="icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 2.25 19.5 19.5" stroke-width="2" />
        </svg>
      </div>
      <h1>No Connection</h1>
      <p>Unable to reach the BizArch server. Check your internet connection and try again.</p>
      <button onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
