<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, height=300">
  <title>Loading BizArch ERP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e0e0e0;
      -webkit-app-region: drag;
      user-select: none;
      overflow: hidden;
    }

    .brand {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 32px;
      color: #ffffff;
    }

    .brand span {
      color: #6c63ff;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(108, 99, 255, 0.2);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 14px;
      color: #8a8a9a;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="brand">Biz<span>Arch</span> ERP</div>
  <div class="spinner"></div>
  <div class="loading-text">Loading...</div>
</body>
</html>
